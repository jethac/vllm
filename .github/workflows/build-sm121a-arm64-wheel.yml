# dgx-spark-hijinks campaign: CI sm_121a aarch64 vLLM wheel for Spark-class ARM hosts.
#
# J-8 retarget (2026-07-03): the ubicloud arm64 static runner is gone; this now
# runs on GitHub's hosted arm64 runners (ubuntu-22.04-arm: 4 vCPU Cobalt /
# 15 GiB / ~110 GB disk, free for public repos - probe run 28607441331).
# It is intentionally separate from the x64 sm_120a workflow so both builds
# can run in parallel. On the a4q-v2-build branch the push trigger is
# unfiltered: a branch push launches BOTH wheels.

name: build-sm121a-arm64-wheel

on:
  push:
    branches:
      - a4q-v2-build
  workflow_dispatch:
    inputs:
      release_tag_suffix:
        description: "Optional suffix appended to the release tag (e.g. -retry1)"
        required: false
        default: ""

permissions:
  contents: write # gh release create

concurrency:
  group: build-sm121a-arm64-wheel-${{ github.ref }}
  cancel-in-progress: false

env:
  # torch 2.11 + 22.04 build base to MATCH the proven Spark r10 serving stack
  # (Ubuntu 22.04 / glibc 2.35 / torch 2.11 / flashinfer 76af7982). The wheel
  # then drops into r10 with zero retrofit; bake r11 = r10 + this wheel.
  TORCH_VERSION: "2.11.0"
  TORCH_INDEX_URL: "https://download.pytorch.org/whl/cu130"
  CUDA_HOME: /usr/local/cuda-13.0

jobs:
  build-wheel:
    # glibc 2.35 ceiling: MUST stay on 22.04 (Spark r10 stack).
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Runner inventory
        run: |
          set -euxo pipefail
          uname -a
          dpkg --print-architecture
          lscpu | sed -n '1,24p'
          nproc
          free -h
          df -h /

      - name: Free disk space
        run: |
          set -x
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/.ghcup /usr/share/swift || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Add 16 GiB swap (cicc RAM spikes OOM-killed the runner agent on run 28665869078; swap absorbs them so the runner survives and ccache is always saved -> re-runs resume)
        run: |
          set -euxo pipefail
          # hosted runners pre-provision /swapfile (3 GiB) -> use /swapfile2
          sudo fallocate -l 16G /swapfile2
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          free -h

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CUDA 13.0 toolkit (Ubuntu 24.04 SBSA repo)
        run: |
          set -euxo pipefail
          source /etc/os-release
          UBREPO="ubuntu$(echo "${VERSION_ID}" | tr -d .)"
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${UBREPO}/sbsa/cuda-keyring_1.1-1_all.deb" -O /tmp/cuda-keyring.deb
          sudo dpkg -i /tmp/cuda-keyring.deb
          sudo apt-get -qq update
          sudo apt-get -qq install -y cuda-toolkit-13-0 ccache
          ${CUDA_HOME}/bin/nvcc --version

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: sm121a-arm64-ccache-${{ github.sha }}
          restore-keys: |
            sm121a-arm64-ccache-

      - name: Install torch cu130 + build requirements
        run: |
          set -euxo pipefail
          python -VV
          pip install "torch==${TORCH_VERSION}" --index-url "${TORCH_INDEX_URL}"
          python use_existing_torch.py
          pip install -r requirements/build/cuda.txt
          python -c "import torch; print('torch', torch.__version__, 'cuda', torch.version.cuda, 'arch', __import__('platform').machine())"

      - name: Build sm_121a arm64 wheel
        id: build
        timeout-minutes: 320
        continue-on-error: true
        env:
          TORCH_CUDA_ARCH_LIST: "12.1a"
          VLLM_MAIN_CUDA_VERSION: "13.0"
          VLLM_TARGET_DEVICE: cuda
          # Hosted arm64 runner is 4 vCPU / 15 GiB; 3 parallel nvcc jobs is
          # the OOM-safe ceiling (heavy cutlass TUs run 4-6 GB each).
          MAX_JOBS: "3"
          NVCC_THREADS: "1"
          CMAKE_BUILD_PARALLEL_LEVEL: "3"
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          CMAKE_CUDA_COMPILER_LAUNCHER: ccache
          # actions/cache rejects entries >10 GB per repo (shared with the
          # x64 workflow) - stay under half.
          CCACHE_MAXSIZE: 4800M
        run: |
          set -euxo pipefail
          export PATH="${CUDA_HOME}/bin:${PATH}"
          SHORTSHA="884e01b4f"  # pinned: CI-only branch = 884e01b4f + swap/CI edits; wheel content == 884e01b4f
          export VLLM_VERSION_OVERRIDE="0.1.dev1+g${SHORTSHA}.sm121a.arm64.a4q"
          export SETUPTOOLS_SCM_PRETEND_VERSION="${VLLM_VERSION_OVERRIDE}"
          ccache --zero-stats || true
          pip wheel --no-build-isolation --no-deps -w dist . -v
          ccache --show-stats || true
          ls -la dist/

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: sm121a-arm64-ccache-${{ github.sha }}

      - name: Require wheel
        run: |
          set -euxo pipefail
          ls dist/vllm-*.whl || {
            echo "::error::No wheel produced. Re-run this workflow to reuse ccache."
            exit 1
          }

      - name: Sanity - wheel metadata + sm_121a cubin audit
        run: |
          set -euxo pipefail
          WHEEL="$(ls dist/vllm-*.whl)"
          mkdir -p /tmp/wheel_audit
          unzip -q "${WHEEL}" -d /tmp/wheel_audit
          find /tmp/wheel_audit -name METADATA -path "*dist-info*" | head -1 | xargs sed -n '1,12p'
          FAIL=0
          # Enforce sm_121a on vLLM's core extensions. The bundled FA2/FA3
          # compatibility extensions may carry upstream legacy cubins and are
          # not the campaign's Gemma/FlashInfer execution path; print them
          # below as informational provenance instead of failing the wheel.
          for so in $(find /tmp/wheel_audit -name "_C*.abi3.so" -o -name "_moe_C*.abi3.so"); do
            echo "--- ${so}"
            ${CUDA_HOME}/bin/cuobjdump -lelf "${so}" > /tmp/cuobj.txt 2>&1 || { echo "(no ELF payload)"; continue; }
            grep -oE 'sm_[0-9]+a?' /tmp/cuobj.txt | sort | uniq -c
            grep -q 'sm_121a' /tmp/cuobj.txt || { echo "::error::${so} contains no sm_121a cubins"; FAIL=1; }
            # glibc ceiling gate: must load on the Spark r10 stack (Ubuntu 22.04 / glibc 2.35)
            MAXGLIBC="$(objdump -T "${so}" 2>/dev/null | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -1 || true)"
            echo "max_glibc=${MAXGLIBC:-none}"
            if [[ -n "${MAXGLIBC}" ]]; then
              GLIBC_CEILING="$(printf '%s\n2.35\n' "${MAXGLIBC#GLIBC_}" | sort -V | tail -1)"
              if [[ "${GLIBC_CEILING}" != "2.35" ]]; then
                echo "::error::${so} needs ${MAXGLIBC} > GLIBC_2.35 (won't load on Spark r10 / Ubuntu 22.04)"
                FAIL=1
              fi
            fi
          done
          test "${FAIL}" = "0"
          echo "=== informational FA extension arch inventory ==="
          for so in $(find /tmp/wheel_audit -name "_vllm_fa2_C*.abi3.so" -o -name "_vllm_fa3_C*.abi3.so"); do
            echo "--- ${so}"
            ${CUDA_HOME}/bin/cuobjdump -lelf "${so}" > /tmp/cuobj.txt 2>&1 || { echo "(no ELF payload)"; continue; }
            grep -oE 'sm_[0-9]+a?' /tmp/cuobj.txt | sort | uniq -c || true
          done

      - name: Upload wheel as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: vllm-sm121a-arm64-wheel-${{ github.sha }}
          path: dist/vllm-*.whl
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          SHORTSHA="884e01b4f"  # pinned: CI-only branch = 884e01b4f + swap/CI edits; wheel content == 884e01b4f
          TAG="sm121a-arm64-wheels-${SHORTSHA}-a4q${{ inputs.release_tag_suffix || '' }}"
          WHEEL="$(ls dist/vllm-*.whl)"
          NOTES="sm_121a (CC 12.1, GB10 / DGX Spark class) arm64 vLLM wheel with A4Q wiring (env-gated, default off: VLLM_NVFP4_A4Q=1 nvf4-QK prefill, VLLM_NVFP4_KV_QF16=1 fp16-Q; needs jethac/flashinfer @ a4q-prototype).
          Source: ${{ github.ref_name }} @ ${{ github.sha }}
          Toolchain: nvcc 13.0 (SBSA repo, build OS auto), torch ${TORCH_VERSION}+cu130, TORCH_CUDA_ARCH_LIST=12.1a, python 3.12. Built on Ubuntu 22.04 / glibc 2.35 to match the Spark r10 serving stack (torch 2.11) -- loads in r10 with no retrofit; bake r11 = r10 + this wheel."
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${WHEEL}" --clobber
          else
            gh release create "${TAG}" "${WHEEL}" \
              --title "sm121a arm64 wheels @ ${SHORTSHA}" \
              --notes "${NOTES}" \
              --prerelease \
              --target "884e01b4f2510b3f805d1f39920537d0d7b81c38"
          fi
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/tag/${TAG}" | tee -a "${GITHUB_STEP_SUMMARY}"
