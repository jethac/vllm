# dgx-spark-hijinks: build a self-contained Spark-ready vLLM serving IMAGE on
# Ubicloud arm64 and push to ghcr.io. The image bakes a single consistent stack
# (Ubuntu 24.04 + CUDA 13 cu130 + torch 2.12 + the e2-dgv wheel + campaign
# FlashInfer + transformers pin) so it runs AS-IS on GB10 / DGX Spark -- no
# host-side glibc/torch retrofit. See docker/Dockerfile.spark.
#
# Decoupled from the wheel build: it consumes an already-published arm64 wheel
# release (input wheel_release_tag), so adding/rerunning this never needs a
# fresh compile.

name: build-spark-image

on:
  workflow_dispatch:
    inputs:
      wheel_release_tag:
        description: "Release tag holding the sm121a-arm64 wheel to bake"
        required: false
        default: "sm121a-arm64-wheels-98cd3e59f"
      cuda_base:
        description: "CUDA devel base image (arm64, Ubuntu 24.04)"
        required: false
        default: "nvidia/cuda:13.0.1-devel-ubuntu24.04"
      image_tag_suffix:
        description: "Optional suffix for the image tag"
        required: false
        default: ""
  push:
    branches:
      - spark/hijinks-e2-dgv
    paths:
      - ".github/workflows/build-spark-image.yml"
      - "docker/Dockerfile.spark"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-spark-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-image:
    runs-on: ubicloud-standard-30-arm
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Runner inventory
        run: |
          set -eux
          uname -a
          dpkg --print-architecture
          docker version
          df -h /

      - name: Free disk space
        run: |
          set -x
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/.ghcup /usr/share/swift || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Download the e2-dgv arm64 wheel into the build context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${{ inputs.wheel_release_tag || 'sm121a-arm64-wheels-98cd3e59f' }}"
          mkdir -p build_ctx
          gh release download "${TAG}" --repo "${{ github.repository }}" --pattern "*.whl" -D build_ctx
          cp docker/Dockerfile.spark build_ctx/Dockerfile
          ls -la build_ctx/

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push the Spark-ready image
        run: |
          set -euxo pipefail
          SHORTSHA="$(git rev-parse --short=9 HEAD)"
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          SUFFIX="${{ inputs.image_tag_suffix || '' }}"
          IMAGE="ghcr.io/${OWNER}/spark-vllm:e2-dgv-${SHORTSHA}${SUFFIX}"
          WHEEL="$(cd build_ctx && ls vllm-*.whl)"
          CUDA_BASE="${{ inputs.cuda_base || 'nvidia/cuda:13.0.1-devel-ubuntu24.04' }}"
          docker build build_ctx \
            --build-arg VLLM_WHEEL="${WHEEL}" \
            --build-arg CUDA_BASE="${CUDA_BASE}" \
            -t "${IMAGE}"
          docker push "${IMAGE}"
          echo "## Spark-ready image" >> "${GITHUB_STEP_SUMMARY}"
          echo "\`${IMAGE}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "Pull on Spark: \`docker pull ${IMAGE}\`" >> "${GITHUB_STEP_SUMMARY}"
